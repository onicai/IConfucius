action_endpoint:
  actions_module: "actions"

nlg:
  type: rephrase
  llm:
    model_group: response_rephraser

model_groups:
  - id: command_generator
    models:
      - provider: ${RASA_LLM_PROVIDER}
        model: ${RASA_LLM_MODEL}
  - id: response_rephraser
    models:
      - provider: ${RASA_REPHRASER_PROVIDER}
        model: ${RASA_REPHRASER_MODEL}
